<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ขอโทษนะเพื่อน 🐱🥺</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #e0f7fa, #ffebee);
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #333;
      padding: 10px;
      box-sizing: border-box;
    }

    .container {
      text-align: center;
      background: #ffffff;
      padding: 30px 20px;
      border-radius: 25px;
      box-shadow: 0 10px 30px rgba(173, 216, 230, 0.3);
      width: 100%;
      max-width: 380px;
      animation: gentleFloat 4s ease-in-out infinite;
    }

    @keyframes gentleFloat {
      0%,100% { transform: translateY(0); }
      50%     { transform: translateY(-10px); }
    }

    h1 {
      font-size: 3.5rem;
      margin: 0 0 10px;
      color: #ff80ab;
    }

    .sorry {
      font-size: 1.8rem;
      margin: 10px 0 20px;
      color: #f06292;
      font-weight: bold;
    }

    .reason {
      font-size: 1.2rem;
      color: #555;
      margin: 0 0 25px;
      line-height: 1.6;
    }

    .cat {
      font-size: 5rem;
      margin: 15px 0;
      animation: heartbeat 1.5s infinite;
    }

    @keyframes heartbeat {
      0%,100% { transform: scale(1); }
      50%     { transform: scale(1.15); }
    }

    .btn {
      padding: 14px 40px;
      font-size: 1.3rem;
      background: #ff80ab;
      color: white;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 6px 0 #f06292;
      transition: all 0.2s;
      margin: 20px 0 10px;
    }

    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 9px 0 #f06292;
    }

    .btn:active {
      transform: translateY(3px);
      box-shadow: 0 3px 0 #f06292;
    }

    .small-text {
      font-size: 0.95rem;
      color: #888;
      margin-top: 20px;
    }

    .floating-cat {
      position: absolute;
      font-size: 2.2rem;
      opacity: 0;
      pointer-events: none;
      animation: floatUp 5s forwards;
    }

    @keyframes floatUp {
      0%   { opacity: 0; transform: translateY(0) rotate(0deg); }
      20%  { opacity: 1; }
      100% { opacity: 0; transform: translateY(-600px) rotate(720deg); }
    }

    @media (max-width: 400px) {
      h1 { font-size: 3rem; }
      .sorry { font-size: 1.6rem; }
      .reason { font-size: 1.1rem; }
      .cat { font-size: 4rem; }
      .btn { padding: 12px 35px; font-size: 1.2rem; }
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="cat">🐱🥺</div>
    <h1>ขอโทษนะเพื่อน</h1>
    <div class="sorry">ผิดจริง ๆ เลยอะ 😔</div>
    
    <div class="reason" id="reasonText">
      พูดอะไรแรงไปหน่อย / หายไปนาน / ลืมเรื่องสำคัญ<br>
      หรืออะไรก็ตามที่ทำให้เธอเสียใจ<br>
      ไม่ได้ตั้งใจเลยจริง ๆ นะ...
    </div>

    <button class="btn" onclick="forgiveMe()">ให้อภัยหน่อยนะ</button>
    <div class="small-text">ถ้ายังไม่หายโกรธ บอกมาได้เลย จะง้อต่อจนยิ้มได้อีกครั้ง 🐱</div>
  </div>

  <script>
    const reasons = [
      "ฉันมันซุ่มซ่ามเองจริง ๆ เลย",
      "คิดถึงจนทำอะไรผิดพลาดไปซะงั้น",
      "สัญญาจะตั้งใจมากกว่านี้แน่นอนนะ",
      "ไม่อยากให้เราเสียใจเพราะฉันเลย",
      "ขอโทษจากใจจริง ๆ เลยนะเพื่อน",
      "บอกมาได้เลยว่าทำอะไรให้หายโกรธ",
      "อยากกอดขอโทษแบบจริงจังเลย",
      "เธอสำคัญกับฉันมากนะ รู้มั้ย",
      "ขอโทษที่ทำให้วันนี้ไม่ดีเลย",
      "ให้โอกาสฉันแก้ตัวอีกครั้งได้มั้ย"
    ];

    let count = 0;

    function forgiveMe() {
      count++;
      const text = document.getElementById("reasonText");
      
      if (count < 6) {
        text.innerHTML = reasons[Math.floor(Math.random() * reasons.length)];
        createFloatingCats(6);
      } else {
        text.innerHTML = "ขอบคุณที่ให้อภัยนะ 🥰<br>มากอดกันหน่อยได้มั้ย 🤗🐱";
        document.querySelector(".btn").innerText = "มากอดเลย!";
        document.querySelector(".btn").onclick = () => {
          alert("กอดแน่น ๆ เลยนะ 🐱 (กอดจริง ๆ ด้วย!)");
        };
      }
    }

    function createFloatingCats(num) {
      const cats = ["🐱","😿","🐾","🙀","😺","🐈"];
      for (let i = 0; i < num; i++) {
        const cat = document.createElement("div");
        cat.className = "floating-cat";
        cat.innerText = cats[Math.floor(Math.random()*cats.length)];
        cat.style.left = Math.random() * 90 + 5 + "%";
        cat.style.top = "100%";
        cat.style.animationDuration = (Math.random() * 3 + 4) + "s";
        document.body.appendChild(cat);
        setTimeout(() => cat.remove(), 7000);
      }
    }
  </script>

</body>
</html>
